<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e1050"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </radialGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="90" x2="180" y2="90" stroke="#6C5CE7" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="90" y1="0" x2="90" y2="180" stroke="#6C5CE7" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="0" y1="45" x2="180" y2="45" stroke="#6C5CE7" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="135" x2="180" y2="135" stroke="#6C5CE7" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="45" y1="0" x2="45" y2="180" stroke="#6C5CE7" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="135" y1="0" x2="135" y2="180" stroke="#6C5CE7" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Road/path arc -->
  <path d="M 28 148 Q 90 52 152 148" stroke="url(#road)" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.75"/>

  <!-- Path glow -->
  <path d="M 28 148 Q 90 52 152 148" stroke="#a855f7" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Milestone nodes -->
  <circle cx="28" cy="148" r="9" fill="#6C5CE7" opacity="0.9"/>
  <circle cx="28" cy="148" r="5" fill="#c4b5fd"/>

  <circle cx="152" cy="148" r="9" fill="#6C5CE7" opacity="0.9"/>
  <circle cx="152" cy="148" r="5" fill="#c4b5fd"/>

  <!-- Center milestone (top of arc) -->
  <circle cx="90" cy="76" r="12" fill="#6C5CE7" opacity="0.35" filter="url(#glow)"/>
  <circle cx="90" cy="76" r="10" fill="#1a1040"/>
  <circle cx="90" cy="76" r="7" fill="#6C5CE7" opacity="0.9"/>
  <circle cx="90" cy="76" r="4" fill="#c4b5fd"/>

  <!-- Center star -->
  <g filter="url(#glow)" transform="translate(90, 76)">
    <polygon
      points="0,-30 7,-10 28,-10 12,4 18,24 0,12 -18,24 -12,4 -28,-10 -7,-10"
      fill="url(#star)"
      opacity="0.95"
    />
  </g>

  <!-- Twinkling stars -->
  <circle cx="38" cy="35" r="3.5" fill="#a78bfa" opacity="0.9" filter="url(#softglow)"/>
  <circle cx="142" cy="30" r="2.5" fill="#c4b5fd" opacity="0.8" filter="url(#softglow)"/>
  <circle cx="158" cy="70" r="2" fill="#a78bfa" opacity="0.7"/>
  <circle cx="22" cy="80" r="2" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="68" cy="22" r="1.5" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="118" cy="18" r="1.5" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="160" cy="110" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="20" cy="115" r="1.5" fill="#a78bfa" opacity="0.5"/>
</svg>
