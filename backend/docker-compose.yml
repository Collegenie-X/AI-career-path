version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aicareer_postgres
    environment:
      POSTGRES_DB: aicareerpath
      POSTGRES_USER: aicareer
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aicareer_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicareer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aicareer_redis
    ports:
      - "6379:6379"
    networks:
      - aicareer_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aicareer_django
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    env_file:
      - .env
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aicareer_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: aicareer_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
    networks:
      - aicareer_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  aicareer_network:
    driver: bridge
