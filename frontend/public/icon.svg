<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </radialGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="path" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="16" x2="32" y2="16" stroke="#6C5CE7" stroke-width="0.3" stroke-opacity="0.25"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#6C5CE7" stroke-width="0.3" stroke-opacity="0.25"/>

  <!-- Road/path arc -->
  <path d="M 5 26 Q 16 10 27 26" stroke="url(#path)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Milestone dots on path -->
  <circle cx="5" cy="26" r="2" fill="#6C5CE7"/>
  <circle cx="16" cy="13.5" r="2" fill="#a855f7"/>
  <circle cx="27" cy="26" r="2" fill="#6C5CE7"/>

  <!-- Center star -->
  <g filter="url(#glow)" transform="translate(16, 13.5)">
    <polygon
      points="0,-5.5 1.3,-1.8 5.2,-1.8 2.2,0.7 3.2,4.5 0,2.2 -3.2,4.5 -2.2,0.7 -5.2,-1.8 -1.3,-1.8"
      fill="url(#star)"
    />
  </g>

  <!-- Small twinkling stars -->
  <circle cx="7" cy="7" r="1" fill="#a78bfa" opacity="0.8"/>
  <circle cx="25" cy="6" r="0.8" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="28" cy="14" r="0.6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="4" cy="14" r="0.6" fill="#c4b5fd" opacity="0.6"/>
</svg>
